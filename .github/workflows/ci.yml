name: CI/CD — AI Resume Intelligence Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install black isort

      - name: Check formatting with black
        run: black --check --diff backend/ ai_engine/ tests/ || true

      - name: Check import ordering with isort
        run: isort --check-only --diff backend/ ai_engine/ tests/ || true

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Tesseract)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test env file
        run: |
          cp .env.example .env
          echo "SECRET_KEY=test-secret-key-for-ci-at-least-32-chars" >> .env
          echo "HUGGINGFACE_API_KEY=test_key" >> .env
          echo "OPENAI_API_KEY=test_key" >> .env
          echo "DATABASE_URL=sqlite+aiosqlite:///./test_resume_ai.db" >> .env

      - name: Verify imports
        run: |
          python -c "from ai_engine.parser.resume_parser import ResumeParser; print('✅ Parser OK')"
          python -c "from ai_engine.evaluation.ats_scorer import ATSScorer; print('✅ Scorer OK')"

      - name: Run parser tests
        run: |
          pytest tests/test_parser.py -v \
                 --tb=short -p no:warnings \
                 --cov=ai_engine/parser \
                 --cov-report=xml --cov-report=term-missing

      - name: Run scoring unit tests (skip semantic similarity)
        run: |
          pytest tests/test_scoring.py -v \
                 --tb=short -p no:warnings \
                 --cov=ai_engine/evaluation \
                 --cov-append --cov-report=xml \
                 -k "not semantic and not full_ats_score"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t resume-ai-backend:test .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t resume-ai-frontend:test .

      - name: Test backend health
        run: |
          docker run -d -p 8000:8000 --name test_backend \
            -e SECRET_KEY="test-key-32chars-minimum-required-here" \
            -e HUGGINGFACE_API_KEY="test" \
            resume-ai-backend:test
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test_backend
